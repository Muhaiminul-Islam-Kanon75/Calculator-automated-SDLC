# Automated CI for calculator app 
name: calculator test

on:
  push:
    branches:
    - main # push on main branch
  pull_request: # whenever there is a pull request 

jobs: 
  calc-app: # job name 
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Checkout Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18 
    
    - name: Install dependencies 
      run: npm install
    - name: run test command
      run: npm test
